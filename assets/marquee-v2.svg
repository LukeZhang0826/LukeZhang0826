<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="56" viewBox="0 0 1000 56" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="code, design, music">
  <style>
    :root { --ink: #12120F; }
    @media (prefers-color-scheme: dark) { :root { --ink: #ECEAE3; } }
    .ink { fill: var(--ink); }
    .mut { fill: var(--ink); fill-opacity: 0.5; }
    .rule { stroke: var(--ink); }
    .faint { stroke: var(--ink); stroke-opacity: 0.09; }
    .wire { stroke: var(--ink); fill: none; }
    .box { stroke: var(--ink); stroke-opacity: 0.4; fill: none; }
